# 10주차 칼로리카운터 nginx reverse proxy 설정
#
# 학생 본인 Oracle E2.1.Micro 서버에 배치:
#   sudo cp ~/calorie/nginx-calorie.conf /etc/nginx/sites-available/calorie-counter
#   sudo vi /etc/nginx/sites-available/calorie-counter
#   → __STUDENT_ID__ 자리에 본인 ID(s01~sNN) 입력 후 저장
#   sudo ln -s /etc/nginx/sites-available/calorie-counter /etc/nginx/sites-enabled/
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx
#
# 80번 HTTP만 받음 — Cloudflare Worker가 시트 매핑 기반으로 학생 origin에 HTTP 프록시.
# HTTPS는 Cloudflare Universal SSL이 자동 처리 (학생 도메인 = *.aiweb2026.site).

# WebSocket Upgrade 매핑 (Gradio queue 필수)
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    listen [::]:80;
    server_name __STUDENT_ID__-demo.aiweb2026.site;

    # 음식 사진 업로드 크기 (Gradio 기본 5MB 초과 케이스 대비)
    client_max_body_size 20M;

    # Gradio 컨테이너 (docker-compose의 7860 포트)로 프록시
    location / {
        proxy_pass http://127.0.0.1:7860;

        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;

        # WebSocket 헤더 (Gradio queue 필수, 빠뜨리면 분석 무한 로딩)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # 버퍼링 끄기 (실시간 응답)
        proxy_buffering off;
        proxy_redirect  off;

        # HF Inference API 콜드 스타트 대비 (최대 5분)
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}
