<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Quicksand:wght@400;600&family=Nanum+Pen+Script&display=swap" rel="stylesheet">
<style>
@page { size: A4; margin: 0; }
* { box-sizing: border-box; margin: 0; padding: 0; background-color: transparent; }

body {
    width: 100%; min-height: 1500px;
    margin: 0 !important; padding: 0 !important;
    background-color: white !important;
    word-break: keep-all !important;
    overflow-wrap: break-word !important;
    
}

.page-container {
    position: absolute !important;
    top: 41.25px !important; 
    left: 50% !important; 
    margin-left: -350px !important;
    width: 700px !important; 
    height: 1040px !important;
    display: flex; 
    flex-direction: column;
    overflow: hidden !important;
}

body { font-family: 'Quicksand', 'Nanum Pen Script', sans-serif; color: #3d348b; } h1, h2, h3, .title { font-family: 'Pacifico', 'Nanum Pen Script', cursive; color: #f15bb5; } .page-container { position: relative; } .page-container::before { content: ''; position: absolute; top: -8px; left: -8px; width: 12px; height: 12px; border-top: 1px solid #e0b1cb; border-left: 1px solid #e0b1cb; pointer-events: none; } .page-container::after { content: ''; position: absolute; bottom: -8px; right: -8px; width: 12px; height: 12px; border-bottom: 1px solid #e0b1cb; border-right: 1px solid #e0b1cb; pointer-events: none; } .header-block { background-color: #fff0f3; color: #d90429; padding: 6px 12px; border-radius: 20px; font-family: 'Pacifico', 'Nanum Pen Script', cursive; border: 1.5px dashed #e0b1cb; text-align: center; } .card { border: 2px dashed #e0b1cb; border-radius: 16px; padding: 15px; background-color: #fffbfc; box-shadow: 0 4px 10px rgba(224, 177, 203, 0.1); } .checkbox-circle { width: 16px; height: 16px; border: 2px solid #e0b1cb; border-radius: 50%; display: inline-block; background: #ffffff; vertical-align: middle; } .badge { background: #f15bb5; color: #ffffff; padding: 2px 8px; font-size: 0.75rem; border-radius: 10px; font-family: 'Quicksand', sans-serif; font-weight: 600; display: inline-block; }

.lined-bg {
    background-image: url("data:image/svg+xml,%3Csvg%20xmlns%3D%27http%3A//www.w3.org/2000/svg%27%20width%3D%2720%27%20height%3D%2720%27%3E%3Crect%20x%3D%270%27%20y%3D%2719%27%20width%3D%2720%27%20height%3D%271%27%20fill%3D%27rgba%28224%2C%20177%2C%20203%2C%200.4%29%27/%3E%3C/svg%3E") !important;
    background-position: top !important;
    background-repeat: repeat !important;
}
.grid-bg {
    background-image: url("data:image/svg+xml,%3Csvg%20xmlns%3D%27http%3A//www.w3.org/2000/svg%27%20width%3D%2720%27%20height%3D%2720%27%3E%3Cpath%20d%3D%27M%2020%200%20L%2020%2020%20L%200%2020%27%20fill%3D%27none%27%20stroke%3D%27rgba%28224%2C%20177%2C%20203%2C%200.4%29%27%20stroke-width%3D%271%27/%3E%3C/svg%3E") !important;
    background-position: top !important;
    background-repeat: repeat !important;
}
.dot-bg {
    background-image: url("data:image/svg+xml,%3Csvg%20xmlns%3D%27http%3A//www.w3.org/2000/svg%27%20width%3D%2720%27%20height%3D%2720%27%3E%3Ccircle%20cx%3D%271%27%20cy%3D%271%27%20r%3D%271%27%20fill%3D%27rgba%28224%2C%20177%2C%20203%2C%200.4%29%27/%3E%3C/svg%3E") !important;
    background-position: top !important;
    background-repeat: repeat !important;
}

@import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600&family=Architects+Daughter&display=swap'); * { box-sizing: border-box; word-break: keep-all; overflow-wrap: normal; } body { font-family: 'Quicksand', sans-serif; margin: 0; padding: 0; line-height: 1.4; color: #555; } .planner-wrapper { display: flex; flex-direction: column; width: 100%; height: 100%; padding: 0; } .title { font-family: 'Architects Daughter', cursive; font-size: 32px; color: #ff9aa2; margin: 0; } .header-row { display: flex; justify-content: space-between; align-items: flex-end; padding: 15px; } .card { border: 1px solid #ccc; padding: 12px; margin-bottom: 12px; } .meta-field { display: flex; align-items: baseline; gap: 8px; flex: 1; } .underline { flex: 1; border-bottom: 1px solid #ccc; } .circle { flex: none; width: 20px; height: 20px; border-radius: 50%; border: 1px solid #ccc; display: flex; align-items: center; justify-content: center; font-size: 12px; box-sizing: border-box; } .lined-bg { background-image: linear-gradient(#eee 1px, transparent 1px); background-size: 100% 28px; flex-grow: 1; min-height: 80px; } h2 { font-family: 'Architects Daughter', cursive; font-size: 18px; color: #ffb7b2; margin: 0 0 8px 0; } 
</style>
</head>
<body>
    <div class="page-container">
<div class="planner-wrapper"><div class="header-row"><h1 class="title">Reading Note</h1><div class="meta-field" style="justify-content: flex-end;"><span>Date:</span><div class="underline">&nbsp;</div></div></div><div class="card"><div style="display: flex; gap: 15px; margin-bottom: 10px;"><div class="meta-field"><span>Book Title:</span><div class="underline">&nbsp;</div></div><div class="meta-field"><span>Author:</span><div class="underline">&nbsp;</div></div></div><div style="display: flex; gap: 15px;"><div class="meta-field"><span>Genre:</span><div class="underline">&nbsp;</div></div><div class="meta-field" style="align-items: center;"><span>Rating:</span><div class="circle">&nbsp;</div><div class="circle">&nbsp;</div><div class="circle">&nbsp;</div><div class="circle">&nbsp;</div><div class="circle">&nbsp;</div></div></div></div><div class="card" style="flex-grow: 1; display: flex; flex-direction: column;"><h2>Key Summary</h2><div class="lined-bg"></div></div><div class="card" style="flex-grow: 1; display: flex; flex-direction: column;"><h2>Memorable Quotes</h2><div class="lined-bg"></div></div><div class="card" style="flex-grow: 1; display: flex; flex-direction: column;"><h2>Personal Thoughts</h2><div class="lined-bg"></div></div></div>
    </div>
</body>
</html>
