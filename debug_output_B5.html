<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
@page { size: B5; margin: 0; }
* { box-sizing: border-box; margin: 0; padding: 0; background-color: transparent; }

body {
    width: 100vw; height: 100vh;
    margin: 0 !important; padding: 0 !important;
    overflow: hidden !important;
    background-color: white !important;
    
    background-image: radial-gradient(circle, #b0b0b0 1px, transparent 1px) !important;
    background-size: 20px 20px !important;
    background-position: calc(50% + 0px) 60px !important;
        
}

.page-container {
    position: absolute !important;
    top: 60px !important; 
    left: 50% !important; 
    margin-left: -280px !important;
    width: 560px !important; 
    height: 860px !important;
    display: flex; 
    flex-direction: column;
    overflow: hidden !important;
}


  @import url("https://fonts.googleapis.com/css2?family=Patrick+Hand&display=swap");
  .bujo-container {
    width: 560px;
    height: 860px;
    font-family: 'Patrick Hand', cursive;
    display: flex;
    flex-direction: column;
    padding: 40px;
    background-color: transparent !important;
  }
  .header {
    height: 80px;
    border-bottom: 2px solid #333;
    font-size: 40px;
    display: flex;
    align-items: center;
    margin-bottom: 40px;
  }
  .book-row {
    height: 120px;
    display: flex;
    border-bottom: 1px solid #333;
    padding-bottom: 20px;
    margin-bottom: 20px;
  }
  .spine {
    width: 60px;
    height: 100px;
    border: 2px solid #333;
    margin-right: 20px;
  }
  .lines {
    flex-grow: 1;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }
  .line {
    height: 20px;
    border-bottom: 1px solid #333;
    width: 400px;
  }
  .notes-section {
    flex-grow: 1;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }
  .note-line {
    height: 20px;
    border-bottom: 1px solid #333;
  }

</style>
</head>
<body>
    <div class="page-container">
<div class="bujo-container">
  <div class="header">Reading Journal</div>
  
  <div class="book-row">
    <div class="spine"></div>
    <div class="lines">
      <div class="line"></div>
      <div class="line"></div>
      <div class="line"></div>
    </div>
  </div>

  <div class="book-row">
    <div class="spine"></div>
    <div class="lines">
      <div class="line"></div>
      <div class="line"></div>
      <div class="line"></div>
    </div>
  </div>

  <div class="book-row">
    <div class="spine"></div>
    <div class="lines">
      <div class="line"></div>
      <div class="line"></div>
      <div class="line"></div>
    </div>
  </div>

  <div class="notes-section">
    <div style="font-size: 24px; margin-top: 20px;">Notes & Reflections</div>
    <div class="note-line"></div>
    <div class="note-line"></div>
    <div class="note-line"></div>
    <div class="note-line"></div>
    <div class="note-line"></div>
    <div class="note-line"></div>
    <div class="note-line"></div>
    <div class="note-line"></div>
    <div class="note-line"></div>
  </div>
</div>
    </div>
</body>
</html>
