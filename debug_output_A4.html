<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
@page { size: A4; margin: 0; }
* { box-sizing: border-box; margin: 0; padding: 0; background-color: transparent; }

body {
    width: 100vw; height: 100vh;
    margin: 0 !important; padding: 0 !important;
    overflow: hidden !important;
    background-color: white !important;
    
    background-image: radial-gradient(circle, #b0b0b0 1px, transparent 1px) !important;
    background-size: 20px 20px !important;
    background-position: calc(50% + -10px) 60px !important;
        
}

.page-container {
    position: absolute !important;
    top: 60px !important; 
    left: 50% !important; 
    margin-left: -350px !important;
    width: 700px !important; 
    height: 1040px !important;
    display: flex; 
    flex-direction: column;
    overflow: hidden !important;
}


  @import url("https://fonts.googleapis.com/css2?family=Patrick+Hand&display=swap");

  .journal-container {
    width: 700px;
    height: 1040px;
    display: flex;
    flex-direction: column;
    font-family: 'Patrick Hand', cursive;
    padding: 40px;
    box-sizing: border-box;
    background-color: transparent !important;
  }

  .header {
    width: 620px;
    height: 80px;
    border-bottom: 2px solid #333;
    font-size: 40px;
    display: flex;
    align-items: center;
    margin-bottom: 40px;
  }

  .section-row {
    display: flex;
    flex-direction: row;
    width: 620px;
    height: 300px;
    margin-bottom: 40px;
    gap: 40px;
  }

  .book-slot {
    width: 290px;
    height: 300px;
    border: 2px solid #333;
    display: flex;
    flex-direction: column;
    padding: 20px;
  }

  .line {
    width: 250px;
    height: 40px;
    border-bottom: 1px solid #333;
    margin-bottom: 20px;
  }

  .notes-area {
    width: 620px;
    flex-grow: 1;
    border: 2px solid #333;
    padding: 20px;
    display: flex;
    flex-direction: column;
  }

  .notes-line {
    width: 580px;
    height: 40px;
    border-bottom: 1px solid #333;
  }

</style>
</head>
<body>
    <div class="page-container">
<div class="journal-container">
  <div class="header">Reading Journal</div>
  
  <div class="section-row">
    <div class="book-slot">
      <div class="line">Title:</div>
      <div class="line">Author:</div>
      <div class="line">Rating:</div>
    </div>
    <div class="book-slot">
      <div class="line">Title:</div>
      <div class="line">Author:</div>
      <div class="line">Rating:</div>
    </div>
  </div>

  <div class="section-row">
    <div class="book-slot">
      <div class="line">Title:</div>
      <div class="line">Author:</div>
      <div class="line">Rating:</div>
    </div>
    <div class="book-slot">
      <div class="line">Title:</div>
      <div class="line">Author:</div>
      <div class="line">Rating:</div>
    </div>
  </div>

  <div class="notes-area">
    <div style="font-size: 24px; margin-bottom: 20px;">Review / Thoughts:</div>
    <div class="notes-line"></div>
    <div class="notes-line"></div>
    <div class="notes-line"></div>
    <div class="notes-line"></div>
    <div class="notes-line"></div>
    <div class="notes-line"></div>
    <div class="notes-line"></div>
    <div class="notes-line"></div>
  </div>
</div>
    </div>
</body>
</html>
