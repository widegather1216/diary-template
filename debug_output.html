<!DOCTYPE html>
<html>
<head>
<style>
    * { box-sizing: border-box; }
    body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; color: #333; line-height: 1.4; }
    .container { width: 100%; height: 277mm; display: flex; flex-direction: column; }
    
    /* Header */
    .header { display: flex; justify-content: space-between; align-items: baseline; border-bottom: 2px solid #333; padding-bottom: 10px; margin-bottom: 20px; }
    .title { font-size: 28px; font-weight: bold; letter-spacing: 1px; text-transform: uppercase; }
    .date-field { font-size: 18px; border-bottom: 1px solid #999; width: 200px; text-align: right; }

    /* Calendar Grid */
    .calendar { display: flex; flex-wrap: wrap; flex-grow: 1; border-top: 1px solid #ccc; border-left: 1px solid #ccc; }
    .cell { width: 14.28%; height: 16.66%; border-right: 1px solid #ccc; border-bottom: 1px solid #ccc; padding: 5px; position: relative; }
    .day-num { font-size: 12px; font-weight: bold; color: #888; }

    /* Weekday Headers */
    .weekdays { display: flex; width: 100%; margin-bottom: 5px; }
    .weekday { width: 14.28%; text-align: center; font-size: 10px; font-weight: bold; text-transform: uppercase; color: #555; }

    /* Footer / Notes */
    .footer { margin-top: 15px; height: 40px; border: 1px solid #ddd; background: repeating-linear-gradient(white, white 24px, #f4f4f4 25px); }
</style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="title">Monthly Planner</div>
        <div class="date-field">Month: ______________</div>
    </div>

    <div class="weekdays">
        <div class="weekday">Monday</div><div class="weekday">Tuesday</div><div class="weekday">Wednesday</div>
        <div class="weekday">Thursday</div><div class="weekday">Friday</div><div class="weekday">Saturday</div><div class="weekday">Sunday</div>
    </div>

    <div class="calendar">
        <div class="cell"><div class="day-num"></div></div><div class="cell"><div class="day-num"></div></div><div class="cell"><div class="day-num"></div></div><div class="cell"><div class="day-num"></div></div><div class="cell"><div class="day-num"></div></div><div class="cell"><div class="day-num"></div></div><div class="cell"><div class="day-num"></div></div>
        <div class="cell"><div class="day-num"></div></div><div class="cell"><div class="day-num"></div></div><div class="cell"><div class="day-num"></div></div><div class="cell"><div class="day-num"></div></div><div class="cell"><div class="day-num"></div></div><div class="cell"><div class="day-num"></div></div><div class="cell"><div class="day-num"></div></div>
        <div class="cell"><div class="day-num"></div></div><div class="cell"><div class="day-num"></div></div><div class="cell"><div class="day-num"></div></div><div class="cell"><div class="day-num"></div></div><div class="cell"><div class="day-num"></div></div><div class="cell"><div class="day-num"></div></div><div class="cell"><div class="day-num"></div></div>
        <div class="cell"><div class="day-num"></div></div><div class="cell"><div class="day-num"></div></div><div class="cell"><div class="day-num"></div></div><div class="cell"><div class="day-num"></div></div><div class="cell"><div class="day-num"></div></div><div class="cell"><div class="day-num"></div></div><div class="cell"><div class="day-num"></div></div>
        <div class="cell"><div class="day-num"></div></div><div class="cell"><div class="day-num"></div></div><div class="cell"><div class="day-num"></div></div><div class="cell"><div class="day-num"></div></div><div class="cell"><div class="day-num"></div></div><div class="cell"><div class="day-num"></div></div><div class="cell"><div class="day-num"></div></div>
    </div>

    <div class="footer"></div>
</div>

</body>
</html>
