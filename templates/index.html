<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FormWeaver - AI Planner Generator</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>
    
    <main class="glass-container">
        <header>
            <h1>FormWeaver</h1>
            <p>AI 맞춤형 다이어리/플래너 양식 생성기</p>
        </header>

        <form id="generator-form">
            <div class="form-group">
                <label for="title">양식명 (필수)</label>
                <input type="text" id="title" placeholder="예: 월간 스케줄러, 오답 노트, 업무 일지" required>
            </div>

            <div class="form-group">
                <label for="description">양식 내용 (선택)</label>
                <textarea id="description" placeholder="AI가 참고할 세부 요구사항을 입력하세요..."></textarea>
            </div>

            <div class="form-group">
                <label for="pageSize">용지 규격 (필수)</label>
                <div class="select-wrapper">
                    <select id="pageSize" required>
                        <option value="A4">A4</option>
                        <option value="A5">A5</option>
                    </select>
                </div>
            </div>

            <button type="submit" id="generate-btn">
                <span class="btn-text">PDF 생성하기</span>
                <span class="loader hidden"></span>
            </button>
            <p id="status-message" class="hidden">Gemini가 도면을 정밀 코딩 중입니다...</p>
        </form>
    </main>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
