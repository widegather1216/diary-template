<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FormWeaver - AI Planner Generator</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}?v=7">
</head>
<body>
    <div class="diary-wrapper" id="app-wrapper">
        
        <!-- Elastic Band (다이어리 고무줄) -->
        <div id="diary-band" class="diary-band"></div>

        <!-- State 1: 표지 (Cover) -->
        <div id="cover-panel" class="cover-panel">
            <div class="cover-spine"></div>
            <div class="cover-content">
                <div class="cover-logo">
                    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
                </div>
                <h1 class="cover-title">FormWeaver</h1>
                <p class="cover-subtitle">당신만의 양식 생성기</p>
                <button type="button" id="open-diary-btn" class="open-btn">다이어리 펼치기</button>
            </div>
        </div>

        <!-- State 2,3,4: 내부 페이지 -->
        <div class="diary-pages" id="diary-pages">
            <!-- 좌측 페이지 (입력 폼) -->
            <section class="form-panel page left-page">
                <form id="generator-form" class="generator-form">
                    <div class="form-group">
                        <label for="title">양식명</label>
                        <input type="text" id="title" placeholder="예: Weekly Planner" autocomplete="off" required>
                    </div>

                    <div class="form-group">
                        <label for="description">상세 요구사항 <span class="optional">(선택)</span></label>
                        <textarea id="description" placeholder="원하는 칸 수, 특별한 섹션을 자유롭게 적어주세요."></textarea>
                    </div>

                    <div class="form-row" style="display: flex; gap: 16px;">
                        <div class="form-group" style="flex: 1;">
                            <label for="pageSize">용지 규격</label>
                            <div class="select-wrapper">
                                <select id="pageSize" required>
                                    <option value="A4">A4 (210×297)</option>
                                    <option value="A5">A5 (148×210)</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>출력 용도</label>
                        <div class="radio-group row">
                            <div class="radio-option">
                                <input type="radio" name="designMode" id="mode-print" value="print" checked>
                                <label for="mode-print">디지털 사용</label>
                            </div>
                            <div class="radio-option">
                                <input type="radio" name="designMode" id="mode-guide" value="guide">
                                <label for="mode-guide">아날로그 참고용</label>
                            </div>
                        </div>
                    </div>

                    <button type="submit" id="generate-btn" class="primary-btn">
                        <span class="btn-text">PDF 생성하기</span>
                    </button>
                </form>
            </section>

            <!-- 우측 페이지 (시각 효과 및 결과) -->
            <section class="visual-panel page right-page">
                <!-- Interactive Blueprint Canvas -->
                <div id="interactive-canvas" class="interactive-canvas">
                    <div class="sketch-paper">
                        <div class="paper-watermark">FormWeaver</div>
                        
                        <!-- 사용자 입력 블루프린트 -->
                        <div id="blueprint-container" class="blueprint-container">
                            <!-- 큰 테두리 박스 -->
                            <div id="sketch-outer-box" class="sketch-box outer-box">
                                <!-- 양식명 타이틀 -->
                                <div class="sketch-header">
                                    <span id="sketch-title-text" class="sketch-title-text"></span>
                                </div>
                                
                                <!-- 노트 가로선 (촘촘하게 14개로 확장) -->
                                <div id="sketch-lines-container" class="sketch-lines-container">
                                    <div class="sketch-line horizontal sl-1"></div>
                                    <div class="sketch-line horizontal sl-2"></div>
                                    <div class="sketch-line horizontal sl-3"></div>
                                    <div class="sketch-line horizontal sl-4"></div>
                                    <div class="sketch-line horizontal sl-5"></div>
                                    <div class="sketch-line horizontal sl-6"></div>
                                    <div class="sketch-line horizontal sl-7"></div>
                                    <div class="sketch-line horizontal sl-8"></div>
                                    <div class="sketch-line horizontal sl-9"></div>
                                    <div class="sketch-line horizontal sl-10"></div>
                                    <div class="sketch-line horizontal sl-11"></div>
                                    <div class="sketch-line horizontal sl-12"></div>
                                    <div class="sketch-line horizontal sl-13"></div>
                                    <div class="sketch-line horizontal sl-14"></div>
                                    <div class="sketch-line horizontal sl-15"></div>
                                </div>
                            </div>
                        </div>

                        <!-- 폼 제출 시 기존 로딩 애니메이션 복구 -->
                        <div id="loading-animation-container" class="loading-animation-container hidden">
                            <!-- 로딩 전용 테두리 박스 (애니메이션 요소들을 내부에 포함) -->
                            <div class="sketch-box loading-outer-box">
                                <div class="sketch-line horizontal l1"></div>
                                <div class="sketch-line horizontal l2"></div>
                                <div class="sketch-line horizontal l3"></div>
                                <div class="sketch-box b1">
                                    <div class="sketch-line vertical v1"></div>
                                </div>
                                <div class="sketch-box b2"></div>
                            </div>
                        </div>
                    </div>
                    <p id="canvas-status-text" class="status-text hidden">템플릿을 생성 중입니다...</p>
                </div>
                
                <!-- Result State -->
                <div id="result-container" class="result-container hidden">
                    <div class="success-icon">
                        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
                    </div>
                    <h2 class="success-title">생성이 완료되었습니다</h2>
                    <p class="success-desc">요청하신 디자인이 완벽한 PDF로 구워졌습니다.</p>
                    <a id="download-link" href="#" class="download-btn">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 8px;"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                        PDF 다운로드
                    </a>
                </div>
            </section>
        </div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}?v=7"></script>
</body>
</html>
