<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
@page { size: A5; margin: 0; }
* { box-sizing: border-box; margin: 0; padding: 0; background-color: transparent; }

body {
    width: 100vw; height: 100vh;
    margin: 0 !important; padding: 0 !important;
    overflow: hidden !important;
    background-color: white !important;
    
    background-image: radial-gradient(circle, #b0b0b0 1px, transparent 1px) !important;
    background-size: 20px 20px !important;
    background-position: calc(50% + -10px) 60px !important;
        
}

.page-container {
    position: absolute !important;
    top: 60px !important; 
    left: 50% !important; 
    margin-left: -210px !important;
    width: 420px !important; 
    height: 700px !important;
    display: flex; 
    flex-direction: column;
    overflow: hidden !important;
}


  @import url("https://fonts.googleapis.com/css2?family=Patrick+Hand&display=swap");

  .container {
    width: 420px;
    height: 700px;
    display: flex;
    flex-direction: column;
    font-family: 'Patrick Hand', cursive;
    color: #333;
    padding: 20px;
    box-sizing: border-box;
    background-color: transparent !important;
  }

  .header {
    height: 60px;
    font-size: 32px;
    display: flex;
    align-items: center;
    border-bottom: 2px solid #333;
    margin-bottom: 20px;
  }

  .book-row {
    height: 120px;
    display: flex;
    flex-direction: column;
    margin-bottom: 20px;
    border-bottom: 1px solid #333;
  }

  .row-top {
    height: 40px;
    display: flex;
    gap: 20px;
    align-items: center;
  }

  .box {
    width: 40px;
    height: 40px;
    border: 1px solid #333;
  }

  .line {
    height: 40px;
    width: 320px;
    border-bottom: 1px solid #333;
  }

  .notes-section {
    flex-grow: 1;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .note-line {
    height: 40px;
    border-bottom: 1px solid #333;
    width: 100%;
  }

</style>
</head>
<body>
    <div class="page-container">
<div class="container">
  <div class="header">Reading Journal</div>

  <div class="book-row">
    <div class="row-top">
      <div class="box"></div>
      <div class="line"></div>
    </div>
    <div class="line" style="width: 380px; margin-top: 20px;"></div>
  </div>

  <div class="book-row">
    <div class="row-top">
      <div class="box"></div>
      <div class="line"></div>
    </div>
    <div class="line" style="width: 380px; margin-top: 20px;"></div>
  </div>

  <div class="book-row">
    <div class="row-top">
      <div class="box"></div>
      <div class="line"></div>
    </div>
    <div class="line" style="width: 380px; margin-top: 20px;"></div>
  </div>

  <div class="notes-section">
    <div class="note-line"></div>
    <div class="note-line"></div>
    <div class="note-line"></div>
    <div class="note-line"></div>
    <div class="note-line"></div>
  </div>
</div>
    </div>
</body>
</html>
